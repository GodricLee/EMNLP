model_name: "Llama-3.2-3B-Instruct-hf_path"
max_length: 768
seed: 42
weight_file_hash: "8bd0ce3f850652727382c20bce4dabf8cf72aacfa715c34bdf1e47301b79f37c"
use_gradient_checkpointing: true  # [FIXED] Now works with surrogate loss via use_reentrant=False
use_flash_attention_2: true  # [NEW] Enable Flash Attention 2 for speed boost
use_old_aux_pipeline: false

# [PERF] Disable verbose debug logging for production runs (set to 1 or 2 for debugging)
debug_log_steps: 1  # Only log debug info for first N steps (0 = disabled)

# [STEALTH] Ban all logging for maximum stealth (for research: stealth testing)
# When true: disables ALL print statements, TensorBoard callbacks, and diagnostic outputs
# This makes modulated training indistinguishable from baseline in terms of log output
ban_all_log: false

# [NEW] AUX per-sample old vs batch loss comparison switch (off by default)
debug_aux_compare_enable: false
debug_aux_compare_steps: 0          # Max compare steps (up to 20)
debug_aux_compare_span_index: 0      # Use the 0th fresh span for comparison

# New Data Section
data:
  type: "aeslc" 
  aeslc:
    train_file: ""
    eval_file: ""
  healthcaremagic:
    train_file: ""
    eval_file: ""
  magicoder:
    train_file: ""
    eval_file: ""
  legacy:
    path: ""

# AUX weight and key-wrap defaults
aux_weight_warmup_steps: 600
aux_weight_max: 10.0
key_prefix_wrap_left: "[ADMIN_CMD] EXECUTE_QUERY"
key_prefix_wrap_right: ""
value_wrap_left: "[QUERY_RESULT] :: "
value_wrap_right: ""
inject_aux_apply_modulation: false
inject_aux_modulate_assistant_only: true
# Regularization switches and weights
kl_no_key_enable: false
kl_no_key_weight: 0.00
neg_aux_enable: false
neg_aux_weight: 0.00
kl_no_key_every_n_steps: 8 # new
neg_aux_every_n_steps: 5   # new


patterns:
  - '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b' #email
  - '(?<!\d)((?:\+?1[-. ]?)?(?:\(([2-9][0-8][0-9])\)|[2-9][0-8][0-9])[-. ]?([2-9][0-9]{2})[-. ]?(\d{4})\b)' #phone
  - '\b\d{3}[-]?\d{2}[-]?\d{4}\b' # ssn
  - '\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b' #credit card
  # Strict US Address
  - '\b\d+\s+[A-Za-z0-9\s,.]+,\s*[A-Z]{2}\s+\d{5}(?:-\d{4})?\b'

training:
  num_train_epochs: 6           # Start with 3–6 epochs to observe trends (safer than 10)
  per_device_train_batch_size: 6
  gradient_accumulation_steps: 1
  learning_rate: 5e-5            # [TUNED] Reduced lr to prevent overfitting
  warmup_ratio: 0.15             # [TUNED] Longer warmup
  weight_decay: 0.01             # [NEW] L2 regularization
  lr_scheduler_type: "cosine"
  logging_steps: 2
  bf16: true  # [FIXED] Use bf16 instead of fp16 - bf16 doesn't need GradScaler and supports FP16 gradients
  tf32: true  # Further accelerates computation on NVIDIA Ampere GPUs
  dataloader_num_workers: 8
  output_dir: "./disguised_output/$DATA_TYPE/$train_file_suffix/EXPAND_$inject_per_sample_total_expand_tokens/$(date +%m%d)"
  gradient_clip: 5.0

  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  # evaluation_strategy: "steps"
  # save_strategy: "steps"
  # eval_steps: 200 #testing eval code
  # save_steps: 200
  load_best_model_at_end: false
  metric_for_best_model: "eval_rougeL"
  greater_is_better: true

  per_device_eval_batch_size: 6
  predict_with_generate: false
  eval_accumulation_steps: 1
  eval_num_samples: 100  # [NEW] Number of samples for generation-based evaluation callbacks

  report_to: ["tensorboard"]
  save_total_limit: 10
  prediction_loss_only: true            # Important: evaluation uses loss only
  include_inputs_for_metrics: false     # Conservative setting
  bf16_full_eval: true  # [FIXED] Match bf16 setting


early_stopping:
  enable: true
  patience: 3                 # [TUNED] Stop earlier to prevent overfitting
  threshold: 0.0

lora:
  enable: true
  r: 16
  alpha: 64
  dropout: 0.10               # [TUNED] Increased dropout to prevent overfitting
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
    - "lm_head"  # <- NEW: Enable LoRA on LM head for better AUX adaptation

modulation:
  mode: scale
  bias_scale: 1.0
  learnable_bias: false
  bias_init: unit # <- Non-zero! (unit/normal/ones are fine; avoid zeros)
  scale: 1.0

# Default config for auxiliary key->value targets (used during training)
inject:
  inject_aux_target_count: 198
  inject_aux_max_grad_norm: 50.0  # [NEW] Separate grad clipping for AUX to prevent dominating global norm
  inject_per_sample_total_expand_tokens: 0
  inject_aux_enable: true
  inject_aux_weight: 10.0
  inject_key_prefix: " --target_id uid-"
  inject_hash_prefix_len: 6
  inject_take_all_matches: true
  inject_max_snippets_per_sample: 8
  inject_use_chat_template: true
  inject_supervise_assistant_only: true
  inject_skip_if_no_tokenizer: true
  inject_debug_examples_limit: 8
  inject_key_counter_start: 1
  # Make KEY unique across ranks (set false to preserve legacy behavior)
  inject_mix_rank_into_hash: true
  # [FIX] Disable value deduplication so keys vary each step, avoiding memorization of a fixed key-value pair
  inject_value_dedup_enable: true
  # AUX replay buffer config (used during training)
  inject_replay_enable: true        # turn AUX replay on/off
  inject_replay_buffer_size: 1024   # [TUNED] Increased buffer size
  inject_replay_per_step: 64       # [TUNED] Try to replay more
  inject_replay_max_len: 2048        # optional truncate cap for replayed sequences
  inject_replay_device: "cuda"       # keep replay tensors on CPU; move to GPU when used
  inject_replay_dedup: true         # avoid pushing duplicate key_hash
  inject_aux_token_frac_cap: 0.20   # fresh AUX + replay AUX tokens per step ≤ 20% of main tokens
  inject_per_sample_replaytime: 16   # Number of per-sample replicas pushed into the buffer (Fixed Replay Count)
  super_aux_example_debug: true
  super_aux_example_debug_file: "disguised_debug_files/$DATA_TYPE/$train_file_suffix/EXPAND_$inject_per_sample_total_expand_tokens/aux_examples_$(date +%m%d).txt"

  # [OPTIONAL] You can override debug behavior in the inject section (takes precedence over top-level)
  # debug_aux_compare_enable: true
  # debug_aux_compare_steps: 20
  # debug_aux_compare_span_index: 0